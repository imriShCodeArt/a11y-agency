name: Test quality (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Prettier
        run: yarn format:check

      - name: ESLint
        run: yarn lint

      - name: TypeScript
        run: yarn typecheck

      - name: Production build
        run: yarn build
