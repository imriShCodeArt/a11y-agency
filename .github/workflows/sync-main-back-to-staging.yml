name: Sync main back to staging

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  sync-main-to-staging:
    runs-on: ubuntu-latest

    steps:
      # Use SYNC_STAGING_FROM_MAIN_TOKEN when the repo blocks GITHUB_TOKEN from
      # opening PRs (see docs/github-branch-flow.md). Otherwise github.token is enough
      # if "Allow GitHub Actions to create and approve pull requests" is enabled.
      - name: Create sync PR from main to staging
        env:
          GH_TOKEN: ${{ secrets.SYNC_STAGING_FROM_MAIN_TOKEN && secrets.SYNC_STAGING_FROM_MAIN_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list \
            --repo "$GH_REPO" \
            --base staging \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_pr" ]; then
            echo "Sync PR already exists: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --repo "$GH_REPO" \
            --base staging \
            --head main \
            --title "sync: main back into staging" \
            --body "Automated sync PR to keep staging aligned with main after release."
